name: Build Windows EXE

on:
  push:
    branches:
      - '**'        # 任意分支推送都构建
    tags:
      - 'v*'
  pull_request:      # PR 阶段也构建测试 exe
  workflow_dispatch:

# 同一分支/PR 有新提交时, 取消正在跑的旧构建, 省时间
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Download ffmpeg (static win64)
        shell: pwsh
        run: |
          $url = "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip"
          Invoke-WebRequest -Uri $url -OutFile ffmpeg.zip
          Expand-Archive -Path ffmpeg.zip -DestinationPath ffmpeg_extracted
          $exe = Get-ChildItem -Path ffmpeg_extracted -Recurse -Filter ffmpeg.exe | Select-Object -First 1
          Copy-Item $exe.FullName -Destination ffmpeg.exe
          Write-Host "ffmpeg.exe ready:" (Get-Item ffmpeg.exe).Length "bytes"

      - name: Build single-folder EXE (ffmpeg.exe bundled)
        run: pyinstaller --onefile --name CounterDuration-single --add-binary "ffmpeg.exe;." CounterDuration.py

      - name: Build multi-folder EXE (ffmpeg.exe bundled)
        run: pyinstaller --onefile --name CounterDuration-multi --add-binary "ffmpeg.exe;." CounterDuration.py

      - name: Upload build artifacts (每个分支 / PR 都可下载的测试 exe)
        uses: actions/upload-artifact@v4
        with:
          name: CounterDuration-exe-${{ github.sha }}
          path: |
            dist/CounterDuration-single.exe
            dist/CounterDuration-multi.exe

      # --- 每次推到 main: 刷新固定的 "latest" 滚动发布 (下载链接永不变) ---
      - name: Remove previous "latest" release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete latest --yes --cleanup-tag --repo $env:GITHUB_REPOSITORY 2>&1 | Out-Null
          Write-Host "Cleanup attempted (ignored if no previous 'latest' release)."
          exit 0

      - name: Publish rolling "latest" release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest build (auto)"
          body: "自动构建的最新版本, 双击即用, 无需安装 Python。每次合并到 main 自动更新。"
          prerelease: true
          target_commitish: ${{ github.sha }}
          files: |
            dist/CounterDuration-single.exe
            dist/CounterDuration-multi.exe

      # --- 打 v* tag 时: 发布正式版本 Release ---
      - name: Publish tagged Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/CounterDuration-single.exe
            dist/CounterDuration-multi.exe
          generate_release_notes: true
