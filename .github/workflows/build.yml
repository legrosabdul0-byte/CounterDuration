name: Build Windows EXE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Download ffmpeg (static win64)
        shell: pwsh
        run: |
          $url = "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip"
          Invoke-WebRequest -Uri $url -OutFile ffmpeg.zip
          Expand-Archive -Path ffmpeg.zip -DestinationPath ffmpeg_extracted
          $exe = Get-ChildItem -Path ffmpeg_extracted -Recurse -Filter ffmpeg.exe | Select-Object -First 1
          Copy-Item $exe.FullName -Destination ffmpeg.exe
          Write-Host "ffmpeg.exe ready:" (Get-Item ffmpeg.exe).Length "bytes"

      - name: Build single-file EXE (ffmpeg.exe bundled)
        run: pyinstaller --onefile --name CounterDuration --add-binary "ffmpeg.exe;." CounterDuration.py

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: CounterDuration-exe
          path: dist/CounterDuration.exe

      - name: Publish Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/CounterDuration.exe
          generate_release_notes: true
